name: sanalrehber
description: "Yapay Zeka Destekli Sanal Seyahat Rehberi"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  cloud_functions: ^5.1.3
  firebase_analytics: ^11.3.3


  # Google Sign-In
  google_sign_in: ^6.2.1

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.3.0

  # HTTP & API
  dio: ^5.7.0
  http: ^1.2.2

  # Dependency Injection
  get_it: ^8.0.2

  # TTS (Sesli Anlatım)
  flutter_tts: ^4.0.2

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # UI & Icons
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  google_fonts: ^6.2.1

  # Local Storage
  shared_preferences: ^2.3.2

  # Maps & Routing
  flutter_map: ^7.0.1
  latlong2: ^0.9.1

  # Utils
  url_launcher: ^6.3.0
  intl: ^0.19.0
  uuid: ^4.5.1
  wakelock_plus: 1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/app_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
